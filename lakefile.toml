name = "CommunicationComplexity"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["CommunicationComplexity"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.28.0"

[[require]]
name = "Cslib"
scope = "leanprover"
rev = "b13a672"

[[require]]
name = "doc-gen4"
scope = "leanprover"
rev = "v4.28.0"

[[lean_lib]]
name = "CommunicationComplexity"
globs = ["CommunicationComplexity.+"]
